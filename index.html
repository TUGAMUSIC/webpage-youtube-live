    <style>

    <script>
        // ==========================================
        // PANEL DE CONTROL (EDITA SOLO ESTO)
        // ==========================================
        const CONFIG = {
            youtubeId: "CmqxFFdo7gE",
            titulo: "VOYAGER DISCO - LIVE SET"
        };

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        function arrancarTransmision() {
            // 1. Configurar Video
            const iframe = document.getElementById('main-iframe');
            iframe.src = `https://www.youtube.com/embed/${CONFIG.youtubeId}?origin=${window.location.origin}&iv_load_policy=3&modestbranding=1&playsinline=1&showinfo=0&rel=0&enablejsapi=1`;

            // 2. Configurar Chat
            const dominio = window.location.hostname || "tugamusic.github.io"; 
            const chatUrl = `https://www.youtube.com/live_chat?v=${CONFIG.youtubeId}&embed_domain=${dominio}&dark_theme=1`;
            document.getElementById('chat-iframe').src = chatUrl;

            // 3. Textos
            document.getElementById('stream-title').innerText = CONFIG.titulo;

            // 4. Iniciar Player UI
            const player = new Plyr('#player', {
                youtube: { noCookie: true, rel: 0 }
            });
        }

        arrancarTransmision();
    </script>
