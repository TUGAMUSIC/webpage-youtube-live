<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TugaStream Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>
<body class="bg-zinc-900 text-white min-h-screen">

    <main class="container mx-auto p-4 flex flex-col lg:flex-row gap-6">
        <div class="flex-1">
            <div class="rounded-xl overflow-hidden shadow-2xl">
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
            </div>
        </div>

        <aside class="w-full lg:w-80">
            <a id="ad-link" href="#" target="_blank">
                <img id="ad-img" src="" class="w-full rounded-lg border border-zinc-700" alt="Anuncio">
            </a>
            <p class="text-zinc-500 text-xs mt-2 text-center">Publicidad</p>
        </aside>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    // 1. Definimos la función de carga
    async function cargarTransmision() {
        try {
            // Buscamos el config.json
            const respuesta = await fetch('config.json?v=' + Date.now());
            if (!respuesta.ok) return;
            
            const datos = await respuesta.json();
            const vidId = datos.youtubeId;

            if (!vidId || vidId === "") {
                console.error("No hay ID en el JSON");
                return;
            }

            // 2. BUSCAMOS EL ELEMENTO Y LE PONEMOS EL ID A MANO
            const el = document.getElementById('player');
            el.setAttribute('data-plyr-embed-id', vidId);

            // 3. RECIÉN AQUÍ INICIALIZAMOS PLYR
            const player = new Plyr('#player', {
                youtube: {
                    noCookie: true,
                    rel: 0,
                    showinfo: 0,
                    autoplay: false // Para evitar bloqueos del navegador
                }
            });

            // 4. Actualizar anuncios si existen
            if (datos.anuncioUrl) document.getElementById('ad-img').src = datos.anuncioUrl;
            if (datos.anuncioLink) document.getElementById('ad-link').parentElement.href = datos.anuncioLink;

        } catch (e) {
            console.error("Fallo total:", e);
        }
    }

    // Ejecutamos cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', cargarTransmision);
    } else {
        cargarTransmision();
    }
</script>
</body>
</html>
