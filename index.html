<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TugaStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>
<body class="bg-black text-white">

    <div class="container mx-auto p-4">
        <div class="plyr__video-embed" id="player">
            <iframe
                id="main-iframe"
                src="about:blank" 
                allowfullscreen
                allowtransparency
                allow="autoplay"
            ></iframe>
        </div>

        <div class="mt-4 p-4 bg-zinc-900 rounded border border-zinc-800 flex justify-center">
            <a id="ad-link" href="#" target="_blank">
                <img id="ad-img" src="https://via.placeholder.com/728x90" alt="Anuncio">
            </a>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        async function cargarConfig() {
            try {
                const res = await fetch('config.json?v=' + Date.now());
                const data = await res.json();
                
                if (data.youtubeId) {
                    const iframe = document.getElementById('main-iframe');
                    
                    // 1. Construimos la URL con los parámetros que quieres
                    const newSrc = `https://www.youtube.com/embed/${data.youtubeId}?origin=${window.location.origin}&iv_load_policy=3&modestbranding=1&playsinline=1&showinfo=0&rel=0&enablejsapi=1`;
                    
                    // 2. Cambiamos el src ANTES de iniciar Plyr
                    iframe.src = newSrc;

                    // 3. Iniciamos Plyr sobre el contenedor
                    const player = new Plyr('#player', {
                        youtube: { noCookie: true }
                    });
                }

                // Actualizar anuncios
                if (data.anuncioUrl) document.getElementById('ad-img').src = data.anuncioUrl;
                if (data.anuncioLink) document.getElementById('ad-link').href = data.anuncioLink;

            } catch (e) {
                console.error("Error cargando el JSON:", e);
            }
        }

        // Ejecutar
        cargarConfig();
    </script>
</body>
</html>
