<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TugaStream Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>
<body class="bg-zinc-900 text-white min-h-screen">

    <main class="container mx-auto p-4 flex flex-col lg:flex-row gap-6">
        <div class="flex-1">
            <div class="rounded-xl overflow-hidden shadow-2xl">
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
            </div>
        </div>

        <aside class="w-full lg:w-80">
            <a id="ad-link" href="#" target="_blank">
                <img id="ad-img" src="" class="w-full rounded-lg border border-zinc-700" alt="Anuncio">
            </a>
            <p class="text-zinc-500 text-xs mt-2 text-center">Publicidad</p>
        </aside>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const player = new Plyr('#player');

        // Función para leer la "Base de Datos" (archivo JSON)
        async function loadConfig() {
            try {
                // Agregamos un timestamp para evitar el caché del navegador
                const response = await fetch('config.json?t=' + Date.now());
                const data = await response.json();

                // Actualizar Video
                player.source = {
                    type: 'video',
                    sources: [{ src: data.youtubeId, provider: 'youtube' }],
                };

                // Actualizar Anuncio
                document.getElementById('ad-img').src = data.anuncioUrl;
                document.getElementById('ad-link').href = data.anuncioLink;

            } catch (error) {
                console.error("Error cargando la configuración:", error);
            }
        }

        loadConfig();
    </script>
</body>
</html>
