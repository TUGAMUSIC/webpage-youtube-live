    <!-- 🔥 OVERLAY PRO -->

        <!-- PROGRESS -->
        <div class="h-[3px] bg-white/10">

        </div>

        <div class="flex-1 flex flex-col items-center justify-center gap-6 px-4">

            <!-- ANUNCIO -->

                    };
                </script>
                <script src="//www.highperformanceformat.com/abd4e21740531b9926241f7933675a40/invoke.js"></script>
            </div>

            <!-- CONTENIDO -->
            <div id="dynamic-content"
                class="bg-white/5 border border-white/10 rounded-xl p-4 max-w-md text-center cursor-pointer hover:bg-white/10 transition-all duration-300">

                <p class="text-xs text-gray-400">Cargando contenido...</p>
            </div>

            <!-- SKIP -->
            <button id="skip-btn" class="text-xs px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition">
                OMITIR EN 7
            </button>

    </div>

    <!-- HEADER -->
    <header class="flex justify-between items-center px-4 py-3 bg-black/70 backdrop-blur border-b border-white/5">
        <h1 class="font-bold text-sm tracking-wide">TUGAMUSIC LIVE</h1>
        <span class="text-xs text-red-500">● EN VIVO</span>
    </header>

    <!-- MAIN -->
    <main class="max-w-4xl mx-auto px-3 py-4 space-y-4">

        <!-- VIDEO -->
        <div class="rounded-xl overflow-hidden bg-black">
            <div class="aspect-video">
                <div id="player" class="w-full h-full" data-plyr-provider="youtube" data-plyr-embed-id="Hot4ZU7QJn8">
                </div>
            </div>
        </div>

        <!-- INFO -->
        <div class="px-1">
            <h2 class="text-base font-semibold">Nu-Disco vs House</h2>
            <p class="text-xs text-gray-400">Live DJ Set</p>
        </div>

        <!-- CHAT -->
        <div class="h-[380px] md:h-[500px] rounded-xl overflow-hidden border border-white/10">
            <iframe id="chat-iframe" class="w-full h-full"></iframe>
        </div>

        <!-- BANNER -->
        <div class="flex justify-center">
            <script>
                var atOptions_1 = {
                    key: '155282ebb193f0f3cfce7f418a22d357',
                    format: 'iframe',
                    height: 90,
                    width: 728
                };
            </script>
            <script src="//www.highperformanceformat.com/155282ebb193f0f3cfce7f418a22d357/invoke.js"></script>
        </div>

    </main>

    <!-- FLOAT -->
    <div class="fixed bottom-2 left-1/2 -translate-x-1/2">
        <script>
            var atOptions_2 = {
                key: 'a9007e74934380b8f4e3f0f4e3213262',
                format: 'iframe',
                height: 60,
                width: 468
            };
        </script>
        <script src="//www.highperformanceformat.com/a9007e74934380b8f4e3f0f4e3213262/invoke.js"></script>
    </div>

    <!-- LIBS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <!-- POP -->
    <script src="https://pl28947868.profitablecpmratenetwork.com/9b/9d/97/9b9d9741195af037933a25e640c30102.js"></script>

    <!-- SOCIAL -->
    <script src="https://pl28947874.profitablecpmratenetwork.com/6e/ed/f9/6eedf9ea550cd546c8c210aafa3c5f87.js"></script>

    <!-- NATIVE -->
    <script async
        src="https://pl28947871.profitablecpmratenetwork.com/dd78d8a9eddd3fe0003951375e67c19c/invoke.js"></script>

    <script>

        // PLAYER
        new Plyr('#player', { autoplay: true });

        // CHAT
        document.getElementById('chat-iframe').src =
            `https://www.youtube.com/live_chat?v=Hot4ZU7QJn8&embed_domain=${location.hostname}&dark_theme=1`;

        // =======================
        // 🧠 CONTENIDO DINÁMICO
        // =======================

        const smartlink = "https://www.profitablecpmratenetwork.com/vmp3cgn8?key=46bb8d81acf6d6906ee10c6d34587506";

        const tips = [
            "🎧 Tip: Usa EQ para evitar saturación",
            "🔥 Menos capas = mejor mezcla",
            "📀 Un buen drop necesita silencio antes",
            "🚀 Próximamente en TUGAONE contenido exclusivo",
            "🎛️ Mezclar no es volumen, es balance"
        ];

        const artists = ["Daft Punk", "Avicii", "Calvin Harris", "David Guetta"];

        async function loadContent() {
            const el = document.getElementById("dynamic-content");
            const random = Math.random();

            if (random < 0.6) {
                const artist = artists[Math.floor(Math.random() * artists.length)];

                try {
                    const res = await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${artist}`);
                    const data = await res.json();

                    el.innerHTML = `
                <p class="font-bold text-sm mb-1">${data.title}</p>
                <p class="text-xs text-gray-400">${data.extract.substring(0, 120)}...</p>
                <p class="text-[10px] text-blue-400 mt-2">Toca para explorar</p>
            `;
                } catch {
                    fallback(el);
                }
            } else {
                fallback(el);
            }

            el.onclick = () => window.open(smartlink, "_blank");
        }

        function fallback(el) {
            const tip = tips[Math.floor(Math.random() * tips.length)];
            el.innerHTML = `
        <p class="text-sm">${tip}</p>
        <p class="text-[10px] text-blue-400 mt-2">Ver más</p>
    `;
        }

        // =======================
        // 🔥 OVERLAY
        // =======================

        function showAd() {
            const overlay = document.getElementById("ad-overlay");
            const btn = document.getElementById("skip-btn");
            const progress = document.getElementById("ad-progress");

            overlay.classList.remove("hidden");
            loadContent();

            let time = 7;
            const total = 7;

            const interval = setInterval(() => {
                time--;
                btn.innerText = time > 0 ? `OMITIR EN ${time}` : "OMITIR";
                progress.style.width = ((total - time) / total * 100) + "%";

                if (time <= 0) {
                    clearInterval(interval);
                    btn.onclick = () => overlay.classList.add("hidden");
                }
            }, 1000);
        }

        // TIMING
        setTimeout(showAd, 4000);
        setInterval(showAd, 70000);

        // REFRESH ADS
        setInterval(() => {
            document.querySelectorAll("iframe").forEach(el => {
                if (el.src.includes("highperformanceformat")) {
                    let src = el.src;
                    el.src = "";
                    el.src = src;
                }
            });
        }, 30000);

    </script>

</body>

</html>
