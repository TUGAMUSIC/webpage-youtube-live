<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TugaStream - Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>
<body class="bg-zinc-900 text-white min-h-screen flex flex-col">

    <header class="w-full h-20 bg-zinc-800 border-b border-zinc-700 flex items-center justify-center">
        <div class="bg-zinc-700 w-3/4 h-12 flex items-center justify-center text-zinc-400 italic">
            Espacio para Banner Publicitario (728x90)
        </div>
    </header>

    <main class="flex-1 container mx-auto p-4 flex flex-col lg:flex-row gap-6">
        
        <div class="flex-1">
            <div class="rounded-xl overflow-hidden shadow-2xl bg-black">
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="dQw4w9WgXcQ"></div>
            </div>
            
            <div class="mt-6 p-6 bg-zinc-800 rounded-xl border border-zinc-700">
                <h1 class="text-2xl font-bold mb-2">Transmisión en Vivo</h1>
                <p class="text-zinc-400">Estás viendo el canal oficial. No olvides revisar nuestras promociones laterales.</p>
            </div>
        </div>

        <aside class="w-full lg:w-80 flex flex-col gap-4">
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 h-64 flex items-center justify-center text-center">
                <span class="text-zinc-500">[ Anuncio Lateral 1 ]<br>300x250</span>
            </div>
            <div class="bg-amber-500 p-4 rounded-xl text-zinc-900 font-bold text-center cursor-pointer hover:bg-amber-400 transition">
                ¡COMPRA AQUÍ TUS TICKETS!
            </div>
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 h-full flex items-center justify-center text-center">
                <span class="text-zinc-500">[ Anuncio Lateral 2 ]</span>
            </div>
        </aside>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const player = new Plyr('#player');

        // Función para cargar el video guardado
        const loadStream = () => {
            const videoId = localStorage.getItem('youtube_live_id') || 'dQw4w9WgXcQ';
            player.source = {
                type: 'video',
                sources: [{ src: videoId, provider: 'youtube' }],
            };
        };

        // Escuchar cambios desde la pestaña de CRUD
        window.addEventListener('storage', (e) => {
            if (e.key === 'youtube_live_id') loadStream();
        });

        // Carga inicial
        loadStream();
    </script>
</body>
</html>
