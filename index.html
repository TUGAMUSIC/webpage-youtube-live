<script>
    const player = new Plyr('#player');

    async function loadConfig() {
        try {
            // El ?t= nos asegura que no use una versión vieja guardada en el navegador
            const response = await fetch('config.json?t=' + new Date().getTime());
            
            if (!response.ok) throw new Error("No se pudo leer el config.json");
            
            const data = await response.json();

            if (data.youtubeId) {
                player.source = {
                    type: 'video',
                    sources: [{
                        src: data.youtubeId,
                        provider: 'youtube',
                    }],
                };
            }

            // Actualizar anuncios
            const adImg = document.getElementById('ad-img');
            const adLink = document.getElementById('ad-link');
            if(adImg && data.anuncioUrl) adImg.src = data.anuncioUrl;
            if(adLink && data.anuncioLink) adLink.href = data.anuncioLink;

        } catch (error) {
            console.error("Error detallado:", error);
            // Si falla, carga uno por defecto para que no se vea vacío
            player.source = {
                type: 'video',
                sources: [{ src: 'dQw4w9WgXcQ', provider: 'youtube' }],
            };
        }
    }

    // Ejecutar al cargar
    loadConfig();
</script>
