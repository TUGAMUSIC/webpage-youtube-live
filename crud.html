<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Configuración</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h2 class="font-bold text-xl mb-4">Actualizar Stream y Anuncios</h2>
        
        <label class="block text-sm mb-1">ID de YouTube</label>
        <input type="text" id="ytId" class="w-full border p-2 mb-4 rounded" value="dQw4w9WgXcQ">

        <label class="block text-sm mb-1">URL Imagen Anuncio</label>
        <input type="text" id="adUrl" class="w-full border p-2 mb-4 rounded" value="https://via.placeholder.com/300x250">

        <label class="block text-sm mb-1">Link del Anuncio</label>
        <input type="text" id="adLink" class="w-full border p-2 mb-4 rounded" value="https://google.com">

        <button onclick="descargarJSON()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">
            DESCARGAR config.json
        </button>
        
        <p class="text-xs text-zinc-500 mt-4">
            * Descarga el archivo, reemplaza el `config.json` viejo en tu carpeta y sube los cambios (push) a GitHub.
        </p>
    </div>

    <script>
        function descargarJSON() {
            const data = {
                youtubeId: document.getElementById('ytId').value,
                anuncioUrl: document.getElementById('adUrl').value,
                anuncioLink: document.getElementById('adLink').value
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'config.json';
            a.click();
        }
    </script>
</body>
</html>
